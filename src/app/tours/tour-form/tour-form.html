<section class="tour-form-shell">
  <div class="form-toolbar">
    <a pButton routerLink="/tours" severity="secondary" [text]="true">
      <span pButtonLabel>Back to tours</span>
    </a>
  </div>

  <header class="form-header">
    <p>Tour Planner</p>
    <h1>{{ tourFormVm.pageTitle() }}</h1>
  </header>

  @if (tourFormVm.noticeMessage(); as noticeMessage) {
    <app-status-message variant="notice">
      {{ noticeMessage }}
    </app-status-message>
  }

  @if (tourFormVm.errorMessage(); as errorMessage) {
    <app-status-message variant="error">
      {{ errorMessage }}
    </app-status-message>
  }

  @if (tourFormVm.loading()) {
    <app-status-message variant="loading">Loading tour...</app-status-message>
  } @else {
    <form class="tour-form" [formGroup]="tourFormVm.form" (ngSubmit)="tourFormVm.submit()" novalidate>
      <section class="form-section">
        <h2>Basics</h2>

        <label class="form-field">
          <span>Name</span>
          <input
            pInputText
            id="tour-name"
            name="name"
            type="text"
            formControlName="name"
            maxlength="120"
            [attr.aria-invalid]="tourFormVm.controlInvalid('name')"
          />
          @if (tourFormVm.controlError('name'); as message) {
            <small>{{ message }}</small>
          }
        </label>

        <label class="form-field">
          <span>Description</span>
          <textarea
            id="tour-description"
            name="description"
            formControlName="description"
            rows="5"
            maxlength="5000"
            [attr.aria-invalid]="tourFormVm.controlInvalid('description')"
          ></textarea>
          @if (tourFormVm.controlError('description'); as message) {
            <small>{{ message }}</small>
          }
        </label>

        <div class="form-grid">
          <label class="form-field">
            <span>Transport type</span>
            <select
              id="tour-transport-type"
              name="transportType"
              formControlName="transportType"
              [attr.aria-invalid]="tourFormVm.controlInvalid('transportType')"
            >
              @for (option of tourFormVm.transportOptions; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>
            @if (tourFormVm.controlError('transportType'); as message) {
              <small>{{ message }}</small>
            }
          </label>

          <label class="form-field">
            <span>Timezone</span>
            <input
              pInputText
              id="tour-timezone-id"
              name="timezoneId"
              type="text"
              formControlName="timezoneId"
              maxlength="64"
              [attr.aria-invalid]="tourFormVm.controlInvalid('timezoneId')"
            />
            @if (tourFormVm.controlError('timezoneId'); as message) {
              <small>{{ message }}</small>
            }
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2>Route</h2>

        <div class="form-grid">
          <label class="form-field">
            <span>Start location</span>
            <input
              pInputText
              id="tour-start-location"
              name="startLocation"
              type="text"
              formControlName="startLocation"
              maxlength="255"
              [attr.aria-invalid]="tourFormVm.controlInvalid('startLocation')"
            />
            @if (tourFormVm.controlError('startLocation'); as message) {
              <small>{{ message }}</small>
            }
          </label>

          <label class="form-field">
            <span>End location</span>
            <input
              pInputText
              id="tour-end-location"
              name="endLocation"
              type="text"
              formControlName="endLocation"
              maxlength="255"
              [attr.aria-invalid]="tourFormVm.controlInvalid('endLocation')"
            />
            @if (tourFormVm.controlError('endLocation'); as message) {
              <small>{{ message }}</small>
            }
          </label>
        </div>

        <div class="form-grid form-grid--coordinates">
          <label class="form-field">
            <span>Start latitude</span>
            <input
              pInputText
              id="tour-start-latitude"
              name="startLatitude"
              type="number"
              step="0.0001"
              formControlName="startLatitude"
              [attr.aria-invalid]="tourFormVm.controlInvalid('startLatitude')"
            />
            @if (tourFormVm.controlError('startLatitude'); as message) {
              <small>{{ message }}</small>
            }
          </label>

          <label class="form-field">
            <span>Start longitude</span>
            <input
              pInputText
              id="tour-start-longitude"
              name="startLongitude"
              type="number"
              step="0.0001"
              formControlName="startLongitude"
              [attr.aria-invalid]="tourFormVm.controlInvalid('startLongitude')"
            />
            @if (tourFormVm.controlError('startLongitude'); as message) {
              <small>{{ message }}</small>
            }
          </label>

          <label class="form-field">
            <span>End latitude</span>
            <input
              pInputText
              id="tour-end-latitude"
              name="endLatitude"
              type="number"
              step="0.0001"
              formControlName="endLatitude"
              [attr.aria-invalid]="tourFormVm.controlInvalid('endLatitude')"
            />
            @if (tourFormVm.controlError('endLatitude'); as message) {
              <small>{{ message }}</small>
            }
          </label>

          <label class="form-field">
            <span>End longitude</span>
            <input
              pInputText
              id="tour-end-longitude"
              name="endLongitude"
              type="number"
              step="0.0001"
              formControlName="endLongitude"
              [attr.aria-invalid]="tourFormVm.controlInvalid('endLongitude')"
            />
            @if (tourFormVm.controlError('endLongitude'); as message) {
              <small>{{ message }}</small>
            }
          </label>
        </div>
      </section>

      <div class="form-actions">
        <button pButton type="submit" [loading]="tourFormVm.saving()" [disabled]="tourFormVm.saving()">
          <span pButtonLabel>{{ tourFormVm.submitLabel() }}</span>
        </button>
        <a pButton routerLink="/tours" severity="secondary" [outlined]="true">
          <span pButtonLabel>Cancel</span>
        </a>
      </div>
    </form>
  }
</section>
