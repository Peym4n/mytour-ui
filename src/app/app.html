<p-toolbar class="app-toolbar" ariaLabelledBy="app-title">
  <ng-template pTemplate="start">
    <a id="app-title" routerLink="/" class="app-brand">MyTour App</a>
  </ng-template>

  <ng-template pTemplate="end">
    <nav class="app-nav" aria-label="Primary navigation">
      <a
        pButton
        routerLink="/tours"
        routerLinkActive="active-route"
        [text]="true"
        severity="secondary"
      >
        <span pButtonLabel>Tours</span>
      </a>
      <a
        pButton
        routerLink="/health"
        routerLinkActive="active-route"
        [text]="true"
        severity="secondary"
      >
        <span pButtonLabel>Backend Health</span>
      </a>
    </nav>
  </ng-template>
</p-toolbar>

<main>
  <router-outlet />
</main>
